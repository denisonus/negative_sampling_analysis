# Dataset
seed: 42
dataset: 'ml-100k'
data_path: 'dataset/'
min_rating: 4

# Model
embedding_size: 64
hidden_size: 128
num_layers: 2
dropout: 0.1

# Training
epochs: 50
train_batch_size: 512
learning_rate: 0.0001
weight_decay: 0.0005
patience: 8

# Negative sampling - general
num_neg_samples: 4
candidate_pool_size: 100

# Hard / hard-uniform mixing
hard_neg_ratio: 0.5

# DNS (Dynamic Negative Sampling)
dns_temperature: 0.1

# In-batch + uniform index batch
mixed_index_batch_size: 512

# Curriculum learning
curriculum_start_ratio: 0.0    # Start with all random negatives
curriculum_end_ratio: 0.8      # End with 80% hard negatives
curriculum_warmup_epochs: 10   # Epochs to transition

# Sampling-bias correction
# Applies to: popularity, in_batch, mixed_in_batch_uniform.
logq_correction: true

# Evaluation
metrics: ['Recall', 'NDCG', 'MRR', 'Hit']
topk: [5, 10, 20]
valid_metric: 'NDCG@10'

# Device: 'auto', 'mps', 'cuda', or 'cpu'
device: 'cpu'
