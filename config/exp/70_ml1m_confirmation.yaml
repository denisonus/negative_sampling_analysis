# Single-run transfer check on MovieLens 1M for the sampler families worth carrying over.
seed: 42
dataset: 'ml-1m'
data_path: 'dataset/'
min_rating: 4

# Model
embedding_size: 64
hidden_size: 128
num_layers: 2
dropout: 0.1

# Training
epochs: 25
train_batch_size: 1024
learning_rate: 0.001
weight_decay: 0.0001
patience: 4

# Negative sampling
num_neg_samples: 4
candidate_pool_size: 200
hard_neg_ratio: 0.5
dns_temperature: 0.1
curriculum_start_ratio: 0.0
curriculum_end_ratio: 0.8
curriculum_warmup_epochs: 6
tau_plus: 0.05
smoothing: 0.75
logq_correction: true

# Evaluation
metrics: ['Recall', 'NDCG', 'MRR', 'Hit', 'Precision', 'MAP']
topk: [5, 10, 20]
valid_metric: 'NDCG@10'

# Device
device: 'cpu'
