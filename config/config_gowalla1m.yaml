# Dataset
seed: 42
dataset: 'gowalla-1m'
data_path: 'dataset/'
implicit_feedback: true
benchmark_filename: ['train', 'valid', 'test']
min_rating: null

# Model
embedding_size: 64
hidden_size: 128
num_layers: 2
dropout: 0.1
feature_aware: false

# Training
epochs: 50
train_batch_size: 1024
learning_rate: 0.001
weight_decay: 0.0001
patience: 10

# Negative sampling - general
num_neg_samples: 4
candidate_pool_size: 300

# Hard / hard-uniform mixing
hard_neg_ratio: 0.5

# DNS (softmax hard-negative sampling)
dns_temperature: 0.1

# In-batch + uniform index batch
mixed_index_batch_size: 1024

# Curriculum learning
curriculum_start_ratio: 0.0
curriculum_end_ratio: 0.8
curriculum_warmup_epochs: 10

# Sampling-bias correction
logq_correction: true

# Evaluation
metrics: ['Recall', 'NDCG', 'MRR', 'Hit']
topk: [20, 50]
valid_metric: 'NDCG@20'

# Device: 'auto', 'mps', 'cuda', or 'cpu'
device: 'auto'
